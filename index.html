<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Order App</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background:#eee;
  padding:10px;
}

.container{
  background:#fff;
  padding:15px;
  border-radius:10px;
  max-width:500px;
  margin:auto;
}

h2,h3{
  text-align:center;
}

input{
  width:100%;
  border:none;
  border-bottom:1px solid #999;
  padding:8px;
  margin:5px 0;
  font-size:14px;
}

.row{
  display:flex;
  gap:10px;
}

.row input{
  flex:1;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #999;
  padding:5px;
  text-align:center;
  font-size:12px;
}

th{
  background:#eee;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  background:black;
  color:white;
  font-size:16px;
  border-radius:8px;
}

.small{
  width:60px;
}

</style>
</head>

<body>

<div class="container">

<h2>mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<div class="row">
<input id="orderDate" placeholder="Order Date">
<input id="dueDate" placeholder="Due Date">
</div>

<input id="distributor" placeholder="Distributor Name">
<input id="address" placeholder="Address">

<div class="row">
<input id="season" placeholder="Season">
<input id="orderType" placeholder="Order Type">
</div>

<div class="row">
<input id="slab" placeholder="Slab (Y/N)">
<input id="approval" placeholder="S. Approval">
</div>

<table id="productTable">
<tr>
<th style="width:30%">Product</th>
<th>P Size</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
<th style="width:10%">Bonus</th>
</tr>

<tr>
<td><input></td>
<td><input></td>
<td><input oninput="calc()"></td>
<td><input oninput="calc()"></td>
<td>0</td>
<td><input></td>
</tr>

</table>

<button onclick="addRow()">+ Add Product</button>

<p><b>Total carton:</b> <span id="totalCarton">0</span></p>
<p><b>Total V:</b> <span id="totalValue">0</span></p>

<input id="officer" placeholder="Officer Name">
<input id="mobile" placeholder="Mobile">
<input id="territory" placeholder="Territory">

<button onclick="generatePDF()">Generate PDF</button>
<button onclick="sharePDF()">Share</button>

</div>

<script>

// add product
function addRow(){
  let table = document.getElementById("productTable");

  let row = table.insertRow();

  row.innerHTML = `
    <td><input></td>
    <td><input></td>
    <td><input oninput="calc()"></td>
    <td><input oninput="calc()"></td>
    <td>0</td>
    <td><input></td>
  `;
}

// calculate
function calc(){
  let table = document.getElementById("productTable");
  let totalCarton = 0;
  let totalValue = 0;

  for(let i=1;i<table.rows.length;i++){
    let cells = table.rows[i].cells;

    let qty = Number(cells[2].children[0].value) || 0;
    let price = Number(cells[3].children[0].value) || 0;

    let total = qty * price;

    cells[4].innerText = total;

    totalCarton += qty;
    totalValue += total;
  }

  document.getElementById("totalCarton").innerText = totalCarton;
  document.getElementById("totalValue").innerText = totalValue;
}

// PDF
function generatePDF(){

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  let y = 10;

  function line(text){
    pdf.text(text,10,y);
    y+=6;
  }

  line("mosco Marketing limited");
  line("Order Submission Format");

  line("Date: " + orderDate.value);
  line("Due Date: " + dueDate.value);
  line("Distributor: " + distributor.value);
  line("Address: " + address.value);
  line("Season: " + season.value);
  line("Order Type: " + orderType.value);
  line("Slab: " + slab.value);
  line("S Approval: " + approval.value);

  y+=5;
  line("Products:");

  let table = document.getElementById("productTable");

  for(let i=1;i<table.rows.length;i++){
    let c = table.rows[i].cells;

    let name = c[0].children[0].value;
    let size = c[1].children[0].value;
    let qty = c[2].children[0].value;
    let price = c[3].children[0].value;
    let total = c[4].innerText;

    line(name+" | "+qty+" x "+price+" = "+total);
  }

  y+=5;
  line("Total Carton: " + totalCarton.innerText);
  line("Total Value: " + totalValue.innerText);

  y+=5;
  line("Officer: " + officer.value);
  line("Mobile: " + mobile.value);
  line("Territory: " + territory.value);

  pdf.save("order.pdf");
}

// Share
function sharePDF(){
  alert("PDF generate করে তারপর share করো");
}

</script>

</body>
</html>
