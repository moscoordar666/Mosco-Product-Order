<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 10px;
  background: #f5f5f5;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #fff;
  padding: 15px;
  border-radius: 10px;
}

h2, h3 {
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border: none;
  border-bottom: 1px solid #ccc;
  font-size: 14px;
}

.row {
  display: flex;
  gap: 5px;
  margin-top: 10px;
}

.product { flex: 2; }
.small { flex: 1; }
.bonus { flex: 0.6; }

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  background: black;
  color: white;
  border-radius: 8px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">

<h2>mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<input placeholder="Order Date">
<input placeholder="Due Date">
<input placeholder="Distributor Name">
<input placeholder="Address">
<input placeholder="Season">
<input placeholder="Order Type">
<input placeholder="Slab (Y/N)">
<input placeholder="S. Approval">

<hr>

<div id="products"></div>

<button onclick="addProduct()">+ Add Product</button>

<h3>Total Carton: <span id="totalCarton">0</span></h3>
<h3>Total Value: <span id="totalValue">0</span></h3>

<input placeholder="Officer Name">
<input placeholder="Mobile">
<input placeholder="Territory">

</div>

<script>

function addProduct() {
  const container = document.getElementById("products");

  const row = document.createElement("div");
  row.className = "row";

  row.innerHTML = `
    <input class="product" placeholder="Product">
    <input class="small qty" type="number" placeholder="Qty">
    <input class="small price" type="number" placeholder="Price">
    <input class="small value" placeholder="Value" readonly>
    <input class="bonus" placeholder="B">
  `;

  container.appendChild(row);

  // Add event listeners AFTER adding
  const qty = row.querySelector(".qty");
  const price = row.querySelector(".price");

  qty.addEventListener("input", calculate);
  price.addEventListener("input", calculate);
}

function calculate() {
  const qtys = document.querySelectorAll(".qty");
  const prices = document.querySelectorAll(".price");
  const values = document.querySelectorAll(".value");

  let totalValue = 0;
  let totalCarton = 0;

  for (let i = 0; i < qtys.length; i++) {
    const q = parseFloat(qtys[i].value) || 0;
    const p = parseFloat(prices[i].value) || 0;

    const v = q * p;
    values[i].value = v;

    totalValue += v;
    totalCarton += q;
  }

  document.getElementById("totalValue").innerText = totalValue;
  document.getElementById("totalCarton").innerText = totalCarton;
}

</script>

</body>
</html>
