<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body {
  font-family: Arial;
  margin: 0;
  background: #ddd;
}

/* Phone Frame Feel */
#formArea {
  max-width: 420px;
  margin: auto;
  background: #eee;
  padding: 15px;
  border-radius: 30px;
  border: 6px solid black;
}

/* Header */
h2 {
  text-align: center;
  margin: 5px 0;
}
h3 {
  text-align: center;
  margin: 0;
}

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

td, th {
  border: 1px solid #444;
  padding: 6px;
  font-size: 13px;
}

th {
  background: #00cfd1;
}

/* Input */
input {
  width: 100%;
  border: none;
  background: transparent;
  outline: none;
}

/* Green Inputs */
.green-box {
  background: #8bc34a;
  border-radius: 20px;
  padding: 8px;
  margin-top: 5px;
}

/* Row Flex */
.flex {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.flex div {
  flex: 1;
}

/* Product column size */
#productTable th:nth-child(1),
#productTable td:nth-child(1) { width: 30%; }

#productTable th:nth-child(2),
#productTable td:nth-child(2) { width: 12%; }

#productTable th:nth-child(3),
#productTable td:nth-child(3) { width: 10%; }

#productTable th:nth-child(4),
#productTable td:nth-child(4) { width: 16%; }

#productTable th:nth-child(5),
#productTable td:nth-child(5) { width: 16%; }

#productTable th:nth-child(6),
#productTable td:nth-child(6) { width: 10%; }

/* Add button */
.add-btn {
  background: #8bc34a;
  padding: 8px;
  border-radius: 10px;
  width: 160px;
  border: none;
  margin-top: 10px;
}

/* Total */
.total {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
}

.total input {
  width: 60px;
  background: #8bc34a;
  border-radius: 8px;
}

/* Officer section */
.officer {
  margin-top: 20px;
}

.officer input {
  border: 1px solid #999;
  border-radius: 20px;
  padding: 6px;
  margin-top: 5px;
}

/* Bottom buttons */
.bottom {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
}

.bottom button {
  flex: 1;
  margin: 5px;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

.pdf-btn {
  background: #8bc34a;
}

.share-btn {
  background: #cddc39;
}

</style>
</head>

<body>

<div id="formArea">

<h2>Mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<table>
<tr>
<td style="background:#00cfd1;">Order Date</td>
<td><input id="orderDate"></td>
<td style="background:#00cfd1;">Due Date</td>
<td><input id="dueDate"></td>
</tr>

<tr>
<td>Distributor Name</td>
<td><input id="name"></td>
<td style="background:#00cfd1;">Season</td>
<td><input id="season"></td>
</tr>

<tr>
<td>Address</td>
<td><input id="address"></td>
<td style="background:#00cfd1;">Order Type</td>
<td><input id="type"></td>
</tr>

<tr>
<td colspan="2">Slab (Y/N)</td>
<td colspan="2"><input id="slab"></td>
</tr>

<tr>
<td colspan="2">S. Approval</td>
<td colspan="2"><input id="approval"></td>
</tr>
</table>

<!-- Green boxes -->
<div class="flex">
  <div>
    <div class="green-box">Mention Depot Name</div>
    <input class="green-box">
  </div>
  <div>
    <div class="green-box">Booking Transport Name</div>
    <input class="green-box">
  </div>
</div>

<!-- Product Table -->
<table id="productTable">
<tr>
<th>Product Name</th>
<th>P Size</th>
<th>Qty</th>
<th>Per ctn price</th>
<th>Total Price</th>
<th>Bonus %</th>
</tr>

<tr>
<td><input></td>
<td><input></td>
<td><input oninput="calculate()"></td>
<td><input oninput="calculate()"></td>
<td><input readonly></td>
<td><input></td>
</tr>
</table>

<button class="add-btn" onclick="addRow()">+ Add Product</button>

<!-- Total -->
<div class="total">
  Total carton = <input id="totalCarton" readonly>
  Total V = <input id="totalValue" readonly>
</div>

<!-- Officer -->
<div class="officer">
  Officer Name <input id="officer">
  Mobile <input id="mobile">
  Territory <input id="territory">
</div>

<!-- Bottom -->
<div class="bottom">
  <button class="pdf-btn" onclick="generatePDF()">Generate PDF</button>
  <button class="share-btn" onclick="share()">Share</button>
</div>

</div>

<script>

// SAME JS (UNCHANGED)

// Add product row
function addRow() {
  let table = document.getElementById("productTable");
  let row = table.insertRow();

  row.innerHTML = `
  <td><input></td>
  <td><input></td>
  <td><input oninput="calculate()"></td>
  <td><input oninput="calculate()"></td>
  <td><input readonly></td>
  <td><input></td>
  `;
}

// Calculate totals
function calculate() {
  let table = document.getElementById("productTable");
  let totalCarton = 0;
  let totalValue = 0;

  for (let i = 1; i < table.rows.length; i++) {
    let qty = table.rows[i].cells[2].children[0].value || 0;
    let price = table.rows[i].cells[3].children[0].value || 0;

    let total = qty * price;

    table.rows[i].cells[4].children[0].value = total;

    totalCarton += Number(qty);
    totalValue += total;
  }

  document.getElementById("totalCarton").value = totalCarton;
  document.getElementById("totalValue").value = totalValue;
}

// PDF
function generatePDF() {
  let form = document.getElementById("formArea");

  html2canvas(form, { scale: 2 }).then(canvas => {

    const { jsPDF } = window.jspdf;
    let pdf = new jsPDF("p", "mm", "a4");

    let imgWidth = 210;
    let pageHeight = 297;

    let imgHeight = canvas.height * imgWidth / canvas.width;
    let heightLeft = imgHeight;

    let position = 0;

    let imgData = canvas.toDataURL("image/png");

    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    // 👉 multiple page loop
    while (heightLeft > 0) {
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    pdf.save("order.pdf");
  });
}

  window.open("https://wa.me/?text=" + encodeURIComponent(text));
}

</script>

</body>
</html>
