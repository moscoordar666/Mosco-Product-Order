<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #eee;
  margin: 0;
  padding: 10px;
}

.container {
  background: white;
  padding: 15px;
  border-radius: 12px;
  max-width: 420px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 5px;
}

h3 {
  text-align: center;
  margin-top: 0;
}

.grid2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

input {
  width: 100%;
  border: none;
  border-bottom: 1px solid #999;
  padding: 8px 5px;
  font-size: 14px;
}

.full {
  grid-column: 1 / 3;
}

table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ccc;
  padding: 5px;
  font-size: 13px;
}

th {
  background: #f5f5f5;
}

.product {
  width: 120px;
}

.bonus {
  width: 50px;
}

.btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: black;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

.summary {
  margin-top: 10px;
  font-size: 16px;
}

</style>
</head>

<body>

<div class="container" id="app">

<h2>mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<div class="grid2">
<input placeholder="Order Date">
<input placeholder="Due Date">

<input class="full" placeholder="Distributor Name">
<input class="full" placeholder="Address">

<input placeholder="Season">
<input placeholder="Order Type">

<input placeholder="Slab (Y/N)">
<input placeholder="S. Approval">
</div>

<table id="productTable">
<tr>
<th class="product">Product</th>
<th>P Size</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
<th class="bonus">B%</th>
</tr>
</table>

<button class="btn" onclick="addRow()">+ Add Product</button>

<div class="summary">
<b>Total carton:</b> <span id="totalQty">0</span><br>
<b>Total V:</b> <span id="totalValue">0</span>
</div>

<br>

<input placeholder="Officer Name">
<input placeholder="Mobile">
<input placeholder="Territory">

<button class="btn" onclick="generatePDF()">Generate PDF</button>
<button class="btn" onclick="shareData()">Share</button>

</div>

<script>

function addRow() {
  let table = document.getElementById("productTable");
  let row = table.insertRow();

  row.innerHTML = `
    <td><input></td>
    <td><input></td>
    <td><input type="number" oninput="calculate()"></td>
    <td><input type="number" oninput="calculate()"></td>
    <td class="total">0</td>
    <td><input></td>
  `;
}

function calculate() {
  let rows = document.querySelectorAll("#productTable tr");
  let totalQty = 0;
  let totalValue = 0;

  rows.forEach((row, index) => {
    if (index === 0) return;

    let qty = row.cells[2].children[0].value || 0;
    let price = row.cells[3].children[0].value || 0;

    let total = qty * price;
    row.cells[4].innerText = total;

    totalQty += Number(qty);
    totalValue += total;
  });

  document.getElementById("totalQty").innerText = totalQty;
  document.getElementById("totalValue").innerText = totalValue;
}

async function generatePDF() {
  const { jsPDF } = window.jspdf;

  let canvas = await html2canvas(document.getElementById("app"));
  let img = canvas.toDataURL("image/png");

  let pdf = new jsPDF();
  pdf.addImage(img, 'PNG', 10, 10, 180, 0);
  pdf.save("order.pdf");
}

async function shareData() {
  let canvas = await html2canvas(document.getElementById("app"));
  canvas.toBlob(async function(blob) {

    let file = new File([blob], "order.png", { type: "image/png" });

    if (navigator.share) {
      await navigator.share({
        title: "Order",
        files: [file]
      });
    } else {
      alert("Sharing not supported");
    }

  });
}

</script>

</body>
</html>
