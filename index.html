<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 10px;
  background: #f5f5f5;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #fff;
  padding: 15px;
  border-radius: 10px;
}

h2, h3 {
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: none;
  border-bottom: 1px solid #ccc;
  font-size: 14px;
}

/* Product Row */
.row {
  display: flex;
  gap: 5px;
  margin-top: 10px;
}

.product {
  flex: 2;
}

.small {
  flex: 1;
}

.bonus {
  flex: 0.6;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  background: black;
  color: white;
  border-radius: 8px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">

<h2>mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<input placeholder="Order Date">
<input placeholder="Due Date">
<input placeholder="Distributor Name">
<input placeholder="Address">
<input placeholder="Season">
<input placeholder="Order Type">
<input placeholder="Slab (Y/N)">
<input placeholder="S. Approval">

<hr>

<div id="products"></div>

<button onclick="addProduct()">+ Add Product</button>

<h3>Total Carton: <span id="totalCarton">0</span></h3>
<h3>Total Value: <span id="totalValue">0</span></h3>

<input placeholder="Officer Name">
<input placeholder="Mobile">
<input placeholder="Territory">

<button>Generate PDF</button>
<button>Share</button>

</div>

<script>

function addProduct() {
  let div = document.createElement("div");
  div.className = "row";

  div.innerHTML = `
    <input class="product" placeholder="Product Name">
    <input class="small qty" placeholder="Qty" type="number" oninput="calculate()">
    <input class="small price" placeholder="Price" type="number" oninput="calculate()">
    <input class="small value" placeholder="Value" readonly>
    <input class="bonus" placeholder="Bonus">
  `;

  document.getElementById("products").appendChild(div);
}

function calculate() {
  let qty = document.querySelectorAll(".qty");
  let price = document.querySelectorAll(".price");
  let value = document.querySelectorAll(".value");

  let totalValue = 0;
  let totalCarton = 0;

  for (let i = 0; i < qty.length; i++) {
    let q = Number(qty[i].value) || 0;
    let p = Number(price[i].value) || 0;

    let v = q * p;
    value[i].value = v;

    totalValue += v;
    totalCarton += q;
  }

  document.getElementById("totalValue").innerText = totalValue;
  document.getElementById("totalCarton").innerText = totalCarton;
}

</script>

</body>
</html>
