<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>

<link rel="icon" href="mosco-logo.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body {
  font-family: Arial;
  margin: 0;
  background: #ddd;
}

#formArea {
  max-width: 420px;
  margin: auto;
  background: #eee;
  padding: 15px;
  border-radius: 30px;
  border: 6px solid black;
}

h2, h3 {
  text-align: center;
  margin: 5px 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

td, th {
  border: 1px solid #444;
  padding: 6px;
  font-size: 13px;
}

th { background: #00cfd1; }

input, select {
  width: 100%;
  border: none;
  background: transparent;
  outline: none;
}

/* 🔥 Product column bigger */
#productTable th:nth-child(2),
#productTable td:nth-child(2) { width: 220px; }

.green-box {
  background: #8bc34a;
  border-radius: 20px;
  padding: 8px;
  margin-top: 5px;
}

.flex {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.flex div { flex: 1; }

.add-btn {
  background: #8bc34a;
  padding: 6px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  font-size: 12px;
}

.total {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
}

.total input {
  width: 100px;
  background: #8bc34a;
  border-radius: 8px;
  text-align: center;
}

.officer {
  margin-top: 20px;
}

.officer input {
  border: 1px solid #999;
  border-radius: 20px;
  padding: 6px;
  margin-top: 5px;
}

.bottom {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.btn {
  flex: 1;
  padding: 8px;
  border-radius: 20px;
  border: none;
  font-size: 13px;
  color: #fff;
}

.pdf-btn { background: #4CAF50; }
.share-btn { background: #009688; }

.clear-btn {
  background: #f44336;
  color:#fff;
  font-size: 12px;
  padding: 6px;
}

/* small install */
.install-btn {
  background: #2196f3;
  color: #fff;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 10px;
}

.no-print {}

</style>
</head>

<body>

<div id="formArea">

<div class="no-print" style="text-align:right;">
  <button class="install-btn" onclick="installApp()">Install</button>
</div>

<div style="text-align:center;">
  <img src="mosco-logo.png" style="width:80px;">
</div>

<h2>Mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<table>
<tr>
<td style="background:#00cfd1;">Order Date</td>
<td><input></td>
<td style="background:#00cfd1;">Due Date</td>
<td><input></td>
</tr>

<tr>
<td>Distributor Name</td>
<td><input></td>
<td style="background:#00cfd1;">Season</td>
<td><input></td>
</tr>

<tr>
<td>Address</td>
<td><input></td>
<td style="background:#00cfd1;">Order Type</td>
<td>
<select>
<option>Cash</option>
<option>Credit</option>
</select>
</td>
</tr>

<tr>
<td colspan="2">Slab (Y/N)</td>
<td colspan="2">
<select>
<option>Yes</option>
<option>No</option>
</select>
</td>
</tr>

<tr>
<td colspan="2">S. Approval</td>
<td colspan="2">
<select>
<option>Yes</option>
<option>No</option>
</select>
</td>
</tr>
</table>

<!-- Depot + Transport -->
<div class="flex">
  <div>
    <div class="green-box">Depot</div>
    <input class="green-box">
  </div>
  <div>
    <div class="green-box">Transport</div>
    <input class="green-box">
  </div>
</div>

<!-- Product Table -->
<table id="productTable">
<tr>
<th>#</th>
<th>Product</th>
<th>Qty</th>
<th>Per Ctn Price</th>
<th>Total Price</th>
<th>Bonus</th>
</tr>

<tr>
<td>1</td>
<td><select class="productList"></select></td>
<td><input oninput="calculate()"></td>
<td><input oninput="calculate()"></td>
<td><input readonly></td>
<td><input></td>
</tr>
</table>

<button class="add-btn no-print" onclick="addRow()">+ Add Product</button>

<div class="total">
Total Ctn = <input id="totalCarton" readonly>
Total V = <input id="totalValue" readonly>
</div>

<div class="officer">
Officer Name <input>
Mobile <input>
Territory <input>
</div>

<div class="bottom no-print">
<button class="btn pdf-btn" onclick="generatePDF()">PDF</button>
<button class="btn share-btn" onclick="share()">Share</button>
</div>

<div style="text-align:center;" class="no-print">
<button class="clear-btn" onclick="location.reload()">Clear</button>
</div>

</div>

<script>

// Product list
const products = ["Agritop 100gm","Agritop 50gm","Agrivit 200gm","Agrivit 100gm","Agrivit 50gm","Agrosave 20 Lit.","Agrosave 100ml","Agrosave 50ml","Arika (Blue) 500gm","Arika (Blue) 100gm","Arika (Yellow) 500gm","Arika (Yellow) 100gm","Beater 400ml","Beater 100ml","Beater 50ml","Biozim 1 Lit.","Biozim 5 Lit.","Biozim 500ml","Biozim 100ml","Builder 500gm","Builder 200gm","Builder 100gm","Cyper 1 Lit.","Cyper 400ml","Cyper 100ml","Dare 1 Lit.","Dare 100ml","Divine 1 Lit.","Divine 100ml","Firotin 400ml","Firotin 100ml","Marine 1Lit","Marine 100ml","Massive 500gm","Massive 100gm","Medisate 1 Lit.","Medisate 100ml","Megazole 1 Lit.","Megazole 100ml","Mosco Boron 500gm","Mostop 100ml","Paramos 1 Lit.","Paramos 100ml","Power Plus 1 Lit.","Power Plus 100ml","Radial 100ml","Real 100ml","Remote 100ml","Repel 100gm","Ronza 10gm","Supervit 1kg","Technovit 100gm","Tiefen 100ml","Winner 1 Lit."];

// dropdown fill
function fillDropdown(select){
 products.forEach(p=>{
  let opt=document.createElement("option");
  opt.textContent=p;
  select.appendChild(opt);
 });
}

fillDropdown(document.querySelector(".productList"));

// add row
function addRow(){
 let table=document.getElementById("productTable");
 let row=table.insertRow();
 let i=table.rows.length-1;

 row.innerHTML=`
 <td>${i}</td>
 <td><select class="productList"></select></td>
 <td><input oninput="calculate()"></td>
 <td><input oninput="calculate()"></td>
 <td><input readonly></td>
 <td><input></td>
 `;
 fillDropdown(row.querySelector("select"));
}

// calculate
function calculate(){
 let table=document.getElementById("productTable");
 let totalC=0,totalV=0;

 for(let i=1;i<table.rows.length;i++){
  let qty=parseFloat(table.rows[i].cells[2].children[0].value)||0;
  let price=parseFloat(table.rows[i].cells[3].children[0].value)||0;

  let total=qty*price;
  table.rows[i].cells[4].children[0].value=total.toFixed(2);

  totalC+=qty;
  totalV+=total;
 }

 document.getElementById("totalCarton").value=totalC;
 document.getElementById("totalValue").value=totalV.toFixed(2);
}

// PDF
async function generatePDF(){
 const { jsPDF } = window.jspdf;
 const canvas = await html2canvas(document.getElementById("formArea"));
 const img = canvas.toDataURL("image/png");

 const pdf = new jsPDF();
 pdf.addImage(img,'PNG',0,0,210,297);
 pdf.save("order.pdf");
}

// Share
function share(){
 if(navigator.share){
  navigator.share({title:"Order",url:location.href});
 } else alert("Not supported");
}

// Install
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
 e.preventDefault();
 deferredPrompt=e;
});
function installApp(){
 if(deferredPrompt) deferredPrompt.prompt();
 else alert("Install not available");
}

</script>

</body>
</html>
