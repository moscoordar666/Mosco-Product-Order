<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="mosco-logo.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#dcdcdc;
  font-family:Arial,sans-serif;
  padding:10px;
}

#formArea{
  width:100%;
  max-width:430px;
  margin:auto;
  background:#efefef;
  padding:15px;
  border-radius:35px;
  border:4px solid #000;
}

/* TITLE */

.logo{
  text-align:center;
}

.logo img{
  width:80px;
}

h2{
  text-align:center;
  margin-top:8px;
  font-size:20px;
}

h3{
  text-align:center;
  margin-top:5px;
  font-size:14px;
}

/* TABLE */

table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
}

th,td{
  border:1px solid #555;
  padding:6px;
  font-size:11px;
  vertical-align:middle;
  word-break:break-word;
}

th{
  background:#1fc8cf;
  font-weight:bold;
}

.label{
  background:#1fc8cf;
  font-weight:bold;
}

/* INPUT */

input,
select,
textarea{
  width:100%;
  border:none;
  outline:none;
  background:transparent;
  font-size:11px;
  padding:5px;
  min-height:28px;
}

/* FLEX */

.flex{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.flex div{
  flex:1;
}

/* GREEN BOX */

.green-title{
  background:#8bc34a;
  border-radius:25px;
  padding:10px;
  margin-bottom:6px;
  font-size:14px;
}

.green-input{
  background:#8bc34a;
  border-radius:25px;
  padding:10px;
}

/* PRODUCT TABLE */

#productTable th:nth-child(1),
#productTable td:nth-child(1){
  width:8%;
  text-align:center;
}

#productTable th:nth-child(2),
#productTable td:nth-child(2){
  width:38%;
}

#productTable th:nth-child(3),
#productTable td:nth-child(3){
  width:14%;
  text-align:center;
}

#productTable th:nth-child(4),
#productTable td:nth-child(4){
  width:18%;
  text-align:center;
}

#productTable th:nth-child(5),
#productTable td:nth-child(5){
  width:18%;
  text-align:center;
}

#productTable th:nth-child(6),
#productTable td:nth-child(6){
  width:8%;
  text-align:center;
}

/* PRODUCT INPUT */

.product-input{
  font-size:10px;
}

.bonus-input{
  text-align:center;
  font-size:10px;
}

/* BUTTON */

.add-btn{
  margin-top:10px;
  background:#8bc34a;
  border:none;
  padding:8px 12px;
  border-radius:12px;
  font-size:12px;
}

/* TOTAL */

.total{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-top:14px;
  font-size:12px;
}

.total-box{
  width:100px;
  background:#8bc34a;
  border-radius:20px;
  padding:8px;
  text-align:center;
}

/* COMMENT */

.comment-title{
  background:#1fc8cf;
  padding:10px;
  border-radius:15px;
  margin-top:18px;
  font-size:13px;
  font-weight:bold;
}

.comment-box{
  width:100%;
  height:120px;
  background:#fff;
  border:2px solid #bbb;
  border-radius:25px;
  margin-top:10px;
  padding:10px;
  resize:none;
  font-size:11px;
}

/* OFFICER */

.officer{
  margin-top:18px;
}

.officer label{
  display:block;
  margin-top:10px;
  margin-bottom:4px;
  font-weight:bold;
}

.officer input{
  background:#fff;
  border:2px solid #bbb;
  border-radius:25px;
  padding:10px;
}

/* BUTTON */

.bottom{
  display:flex;
  gap:8px;
  margin-top:22px;
}

.btn{
  flex:1;
  border:none;
  color:#fff;
  padding:10px;
  border-radius:22px;
  font-size:12px;
  font-weight:bold;
}

.pdf-btn{
  background:#4CAF50;
}

.share-btn{
  background:#009688;
}

.save-btn{
  background:#ff9800;
}

.clear-btn{
  background:#f44336;
}

/* INSTALL */

.install-btn{
  background:#2196f3;
  color:#fff;
  border:none;
  border-radius:10px;
  padding:4px 10px;
  font-size:10px;
}

/* HIDE */

.no-print{
}

@media print{
  .no-print{
    display:none !important;
  }
}

</style>
</head>

<body>

<div id="formArea">

<!-- INSTALL -->

<div class="no-print" style="text-align:right;">
<button class="install-btn" onclick="installApp()">
Install
</button>
</div>

<!-- LOGO -->

<div class="logo">
<img src="mosco-logo.png">
</div>

<!-- TITLE -->

<h2>Mosco Marketing limited</h2>
<h3>Order Submission watermark Adomi</h3>

<!-- TOP TABLE -->

<table>

<tr>
<td class="label">Order Date</td>
<td><input></td>

<td class="label">Due Date</td>
<td><input></td>
</tr>

<tr>
<td>Distributor Name</td>
<td><input></td>

<td class="label">Season</td>
<td><input></td>
</tr>

<tr>
<td>Address</td>
<td><input></td>

<td class="label">Order Type</td>

<td>
<select>
<option>Cash</option>
<option>Credit</option>
</select>
</td>
</tr>

<tr>
<td colspan="2">Slab (Y/N)</td>

<td colspan="2">
<select>
<option>Yes</option>
<option>No</option>
</select>
</td>
</tr>

<tr>
<td colspan="2">S. Approval</td>

<td colspan="2">
<select>
<option>Yes</option>
<option>No</option>
</select>
</td>
</tr>

</table>

<!-- DEPOT -->

<div class="flex">

<div>
<div class="green-title">Depot</div>
<input class="green-input">
</div>

<div>
<div class="green-title">Transport</div>
<input class="green-input">
</div>

</div>

<!-- PRODUCT TABLE -->

<table id="productTable">

<tr>
<th>#</th>
<th>Product</th>
<th>Qty</th>
<th>Per Ctn</th>
<th>Total</th>
<th>Bns</th>
</tr>

<tr>

<td>1</td>

<td>
<input
type="text"
class="product-input"
placeholder="Product Name">
</td>

<td>
<input oninput="calculate()">
</td>

<td>
<input oninput="calculate()">
</td>

<td>
<input readonly>
</td>

<td>
<input maxlength="3" class="bonus-input">
</td>

</tr>

</table>

<!-- ADD PRODUCT -->

<button class="add-btn no-print" onclick="addRow()">
+ Add Product
</button>

<!-- TOTAL -->

<div class="total">

<div>Total Ctn</div>

<input
class="total-box"
id="totalCarton"
readonly>

<div>Total V</div>

<input
class="total-box"
id="totalValue"
readonly>

</div>

<!-- COMMENT -->

<div class="comment-title">
Comment
</div>

<textarea
class="comment-box"
maxlength="100"
placeholder="Write Comment Here...">
</textarea>

<!-- OFFICER -->

<div class="officer">

<label>Officer Name</label>
<input>

<label>Mobile</label>
<input>

<label>Territory</label>
<input>

</div>

<!-- BUTTON -->

<div class="bottom no-print">

<button class="btn pdf-btn" onclick="generatePDF()">
PDF
</button>

<button class="btn share-btn" onclick="shareContent()">
Share
</button>

<button class="btn save-btn" onclick="saveImage()">
Image
</button>

<button class="btn clear-btn" onclick="location.reload()">
Clear
</button>

</div>

</div>

<script>

/* ADD ROW */

function addRow(){

let table=document.getElementById("productTable");

let row=table.insertRow();

let i=table.rows.length-1;

row.innerHTML=`

<td>${i}</td>

<td>
<input
type="text"
class="product-input"
placeholder="Product Name">
</td>

<td>
<input oninput="calculate()">
</td>

<td>
<input oninput="calculate()">
</td>

<td>
<input readonly>
</td>

<td>
<input maxlength="3" class="bonus-input">
</td>

`;

}

/* CALCULATE */

function calculate(){

let table=document.getElementById("productTable");

let tc=0;
let tv=0;

for(let i=1;i<table.rows.length;i++){

let q=parseFloat(
table.rows[i].cells[2].children[0].value
)||0;

let p=parseFloat(
table.rows[i].cells[3].children[0].value
)||0;

let total=q*p;

table.rows[i].cells[4].children[0].value=
total.toFixed(2);

tc+=q;
tv+=total;

}

document.getElementById("totalCarton").value=tc;

document.getElementById("totalValue").value=
tv.toFixed(2);

}

/* CREATE CANVAS */

async function createCanvas(){

const element=document.getElementById("formArea");

document.querySelectorAll(".no-print")
.forEach(el=>el.style.display="none");

const canvas = await html2canvas(element,{

scale:3,

useCORS:true,

allowTaint:true,

backgroundColor:"#efefef",

width:element.scrollWidth,

height:element.scrollHeight,

windowWidth:element.scrollWidth,

windowHeight:element.scrollHeight,

scrollX:0,

scrollY:0

});

document.querySelectorAll(".no-print")
.forEach(el=>el.style.display="");

return canvas;

}

/* SHARE */

async function shareContent(){

try{

const canvas=await createCanvas();

canvas.toBlob(async(blob)=>{

const file=new File(
[blob],
"order-form.png",
{type:"image/png"}
);

if(
navigator.canShare &&
navigator.canShare({files:[file]})
){

await navigator.share({
title:"Order Form",
files:[file]
});

}else{

alert("Sharing not supported");

}

});

}catch(err){

alert("Share Failed");

}

}

/* SAVE IMAGE */

async function saveImage(){

const canvas=await createCanvas();

const link=document.createElement("a");

link.download="order.png";

link.href=canvas.toDataURL("image/png");

link.click();

}

/* PDF */

async function generatePDF(){

const { jsPDF } = window.jspdf;

const canvas=await createCanvas();

const imgData=canvas.toDataURL("image/png");

const pdf=new jsPDF("p","mm","a4");

const pageWidth=190;

const pageHeight=
(canvas.height * pageWidth) / canvas.width;

pdf.addImage(
imgData,
"PNG",
10,
10,
pageWidth,
pageHeight
);

pdf.save("order.pdf");

}

/* INSTALL */

let deferredPrompt;

window.addEventListener(
"beforeinstallprompt",
(e)=>{
e.preventDefault();
deferredPrompt=e;
}
);

function installApp(){

if(deferredPrompt){

deferredPrompt.prompt();

}else{

alert("Install not available");

}

}

/* SERVICE WORKER */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js");

}

</script>

</body>
</html>
