<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>

<link rel="icon" href="mosco-logo.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #ddd;
}

#formArea {
  max-width: 420px;
  margin: auto;
  background: #eee;
  padding: 15px;
  border-radius: 30px;
  border: 6px solid black;
}

h2, h3 {
  text-align: center;
  margin: 5px 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

td, th {
  border: 1px solid #444;
  padding: 6px;
  font-size: 13px;
}

th { background: #00cfd1; }

input {
  width: 100%;
  border: none;
  background: transparent;
  outline: none;
}

/* column fix */
#productTable th:nth-child(2){width:120px;}
#productTable th:nth-child(3){width:60px;}
#productTable th:nth-child(6){width:70px;}
#productTable th:nth-child(7){width:50px;}

.green-box {
  background: #8bc34a;
  border-radius: 20px;
  padding: 8px;
  margin-top: 5px;
}

.flex { display: flex; gap: 10px; margin-top: 10px; }
.flex div { flex: 1; }

.add-btn {
  background: #8bc34a;
  padding: 8px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

.total {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
}

.total input {
  width: 100px;
  background: #8bc34a;
  border-radius: 8px;
}

.officer { margin-top: 20px; }

.officer input {
  border: 1px solid #999;
  border-radius: 20px;
  padding: 6px;
  margin-top: 5px;
}

.bottom {
  display: flex;
  gap: 8px;
  margin-top: 15px;
}

.bottom button {
  flex: 1;
  padding: 8px;
  border-radius: 15px;
  border: none;
  font-size: 12px;
}

.pdf-btn { background: #4CAF50; color:#fff;}
.share-btn { background: #2196F3; color:#fff;}
.clear-btn { background: #f44336; color:#fff;}

.install-btn {
  background:#000;
  color:#fff;
  font-size:10px;
  padding:4px 8px;
  border-radius:10px;
}

/* ❌ hide in PDF */
.no-print{
  display:block;
}
</style>
</head>

<body>

<div id="formArea">

<div style="text-align:center;">
  <img src="mosco-logo.png" style="width:80px;">
</div>

<h2>Mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<div style="text-align:center;" class="no-print">
  <button class="install-btn" onclick="installApp()">📲 Install</button>
</div>

<table>
<tr>
<td style="background:#00cfd1;">Order Date</td>
<td><input id="orderDate"></td>
<td style="background:#00cfd1;">Due Date</td>
<td><input id="dueDate"></td>
</tr>

<tr>
<td>Distributor Name</td>
<td><input id="name"></td>
<td style="background:#00cfd1;">Season</td>
<td><input id="season"></td>
</tr>

<tr>
<td>Address</td>
<td><input id="address"></td>
<td style="background:#00cfd1;">Order Type</td>
<td><input id="type"></td>
</tr>

<tr>
<td colspan="2">Slab</td>
<td colspan="2"><input id="slab"></td>
</tr>

<tr>
<td colspan="2">Approval</td>
<td colspan="2"><input id="approval"></td>
</tr>
</table>

<div class="flex">
  <div>
    <div class="green-box">Depot</div>
    <input class="green-box">
  </div>
  <div>
    <div class="green-box">Transport</div>
    <input class="green-box">
  </div>
</div>

<table id="productTable">
<tr>
<th>#</th>
<th>Product</th>
<th>Size</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
<th>Bonus</th>
</tr>

<tr>
<td>1</td>
<td><input class="product"></td>
<td><input></td>
<td><input oninput="calculate()"></td>
<td><input oninput="calculate()"></td>
<td><input readonly></td>
<td><input></td>
</tr>
</table>

<button class="add-btn no-print" onclick="addRow()">+ Add Product</button>

<div class="total">
  Carton = <input id="totalCarton" readonly>
  Value = <input id="totalValue" readonly>
</div>

<div class="officer">
  Officer <input id="officer">
  Mobile <input id="mobile">
  Territory <input id="territory">
</div>

<div class="bottom no-print">
  <button class="pdf-btn" onclick="generatePDF()">PDF</button>
  <button class="share-btn" onclick="share()">Share</button>
  <button class="clear-btn" onclick="clearForm()">Clear</button>
</div>

</div>

<script>

// 🔥 PRODUCT LIST
const products = [ "Agritop 100gm","Agritop 50gm","Agrivit 200gm","Agrivit 100gm","Agrivit 50gm","Agrosave 20 Lit.","Agrosave 100ml","Agrosave 50ml","Amonot 100ml (Aqua)","Arika (Blue) 500gm","Arika (Blue) 100gm","Arika (Yellow) 500gm","Arika (Yellow) 100gm","Beater 400ml","Beater 100ml","Beater 50ml","Biozim 1 Lit.","Biozim 500ml","Biozim 100ml","Builder 500gm","Builder 100gm","Cyper 1 Lit.","Cyper 100ml","Dare 1 Lit.","Dare 100ml","Divine 1 Lit.","Divine 100ml","Feeder 400ml","Feeder 100ml","Fenobin 500ml","Fenobin 100ml","Firotin 400ml","Firotin 100ml","Halotouch 1 Lit.","Halotouch 100ml","Marine 1Lit","Marine 100ml","Massive 500gm","Massive 100gm","Medisate 1 Lit.","Medisate 100ml","Megazole 1 Lit.","Megazole 100ml","Mighter 400ml","Mighter 100ml","Mohor 100gm","Mohor 50gm","Monoful 1kg","Monozeb 1kg","Mosco Boron 500gm","Mostop 100ml","Namiral 400ml","Oxytop 100ml","Paramos 1 Lit.","Power Plus 1 Lit.","Radial 400ml","Rasim 500gm","Real 400ml","Remote 400ml","Repel 500gm","Ronza 10gm","Resort 400ml","Rylmos 500gm","Supervit 1kg","Tamitap 100gm","Temper 100gm","Technovit 500gm","Tiefen 400ml","Winner 1 Lit." ];

// autocomplete
function setupAutocomplete(input){
  let list=document.createElement("div");
  list.style.position="absolute";
  list.style.background="#fff";
  list.style.maxHeight="150px";
  list.style.overflowY="auto";
  list.style.zIndex="999";
  input.parentNode.appendChild(list);

  input.addEventListener("input",function(){
    list.innerHTML="";
    let val=this.value.toLowerCase();
    products.filter(p=>p.toLowerCase().includes(val)).slice(0,20)
    .forEach(p=>{
      let item=document.createElement("div");
      item.innerHTML=p;
      item.style.padding="5px";
      item.onclick=()=>{
        input.value=p;
        list.innerHTML="";
      };
      list.appendChild(item);
    });
  });
}

// init
document.querySelectorAll(".product").forEach(setupAutocomplete);

// add row
function addRow(){
  let table=document.getElementById("productTable");
  let row=table.insertRow();
  let index=table.rows.length-1;

  row.innerHTML=`
  <td>${index}</td>
  <td><input class="product"></td>
  <td><input></td>
  <td><input oninput="calculate()"></td>
  <td><input oninput="calculate()"></td>
  <td><input readonly></td>
  <td><input></td>`;

  setupAutocomplete(row.querySelector(".product"));
}

// calculate
function calculate(){
  let table=document.getElementById("productTable");
  let totalCarton=0,totalValue=0;

  for(let i=1;i<table.rows.length;i++){
    let qty=table.rows[i].cells[3].children[0].value||0;
    let price=table.rows[i].cells[4].children[0].value||0;
    let total=qty*price;

    table.rows[i].cells[5].children[0].value=total;
    totalCarton+=Number(qty);
    totalValue+=total;
  }

  document.getElementById("totalCarton").value=totalCarton;
  document.getElementById("totalValue").value=totalValue;
}

// PDF
async function generatePDF(){
  document.querySelectorAll(".no-print").forEach(e=>e.style.display="none");

  const { jsPDF } = window.jspdf;
  let canvas=await html2canvas(document.getElementById("formArea"),{scale:2});
  let img=canvas.toDataURL("image/png");

  let pdf=new jsPDF('p','mm','a4');
  let h=canvas.height*210/canvas.width;
  let y=0;

  while(y<h){
    pdf.addImage(img,'PNG',0,-y,210,h);
    y+=297;
    if(y<h) pdf.addPage();
  }

  pdf.save("order.pdf");

  document.querySelectorAll(".no-print").forEach(e=>e.style.display="block");
}

// share
async function share(){
  const { jsPDF } = window.jspdf;
  let canvas=await html2canvas(document.getElementById("formArea"),{scale:2});
  let img=canvas.toDataURL("image/png");

  let pdf=new jsPDF('p','mm','a4');
  pdf.addImage(img,'PNG',0,0,210,canvas.height*210/canvas.width);

  let blob=pdf.output("blob");
  let file=new File([blob],"order.pdf",{type:"application/pdf"});

  if(navigator.share){
    navigator.share({files:[file],title:"Order"});
  }else{
    alert("Use Chrome Mobile");
  }
}

// clear
function clearForm(){
  if(confirm("Clear all?")){
    localStorage.clear();
    location.reload();
  }
}

// install
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredPrompt=e;
});
function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
  }
}

</script>

</body>
</html>
