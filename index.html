<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>
<link rel="manifest" href="manifest.json">

<link rel="icon" href="mosco-logo.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body {
  font-family: Arial;
  margin: 0;
  background: #ddd;
}

#formArea {
  max-width: 420px;
  margin: auto;
  background: #eee;
  padding: 15px;
  border-radius: 30px;
  border: 6px solid black;
}

h2, h3 {
  text-align: center;
  margin: 5px 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

td, th {
  border: 1px solid #444;
  padding: 6px;
  font-size: 13px;
}

th { background: #00cfd1; }

input, select {
  width: 100%;
  border: none;
  background: transparent;
  outline: none;
}

/* Product column bigger */
#productTable th:nth-child(2),
#productTable td:nth-child(2) { width: 220px; }

.green-box {
  background: #8bc34a;
  border-radius: 20px;
  padding: 8px;
  margin-top: 5px;
}

.flex {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.flex div { flex: 1; }

.add-btn {
  background: #8bc34a;
  padding: 6px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  font-size: 12px;
}

.total {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
}

.total input {
  width: 100px;
  background: #8bc34a;
  border-radius: 8px;
  text-align: center;
}

.officer {
  margin-top: 20px;
}

.officer input {
  border: 1px solid #999;
  border-radius: 20px;
  padding: 6px;
  margin-top: 5px;
}

.bottom {
  display: flex;
  gap: 10px;
  margin-top: 25px;
  flex-wrap: wrap;
}

.btn {
  flex: 1;
  padding: 10px;
  border-radius: 25px;
  border: none;
  font-size: 13px;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

/* Colorful buttons */
.pdf-btn {
  background: linear-gradient(45deg, #4CAF50, #2e7d32);
}

.share-btn {
  background: linear-gradient(45deg, #009688, #00695c);
}

.save-btn {
  background: linear-gradient(45deg, #ff9800, #ef6c00);
}

.clear-btn {
  background: linear-gradient(45deg, #f44336, #c62828);
}

/* Hover effect */
.btn:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

.pdf-btn { background: #4CAF50; }
.share-btn { background: #009688; }

.clear-btn {
  background: #f44336;
  color:#fff;
  font-size: 12px;
  padding: 6px;
}

.install-btn {
  background: #2196f3;
  color: #fff;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 10px;
}

/* 🔥 Hide in PDF */
.no-print {}

/* print hide */
@media print {
  .no-print {
    display: none !important;
  }
}

</style>
</head>

<body>

<div id="formArea">

<div class="no-print" style="text-align:right;">
  <button class="install-btn no-print" onclick="installApp()">Install</button>
</div>

<div style="text-align:center;">
  <img src="mosco-logo.png" style="width:80px;">
</div>

<h2>Mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<table>
<tr>
<td style="background:#00cfd1;">Order Date</td>
<td><input></td>
<td style="background:#00cfd1;">Due Date</td>
<td><input></td>
</tr>

<tr>
<td>Distributor Name</td>
<td><input></td>
<td style="background:#00cfd1;">Season</td>
<td><input></td>
</tr>

<tr>
<td>Address</td>
<td><input></td>
<td style="background:#00cfd1;">Order Type</td>
<td>
<select>
<option>Cash</option>
<option>Credit</option>
</select>
</td>
</tr>

<tr>
<td colspan="2">Slab (Y/N)</td>
<td colspan="2">
<select>
<option>Yes</option>
<option>No</option>
</select>
</td>
</tr>

<tr>
<td colspan="2">S. Approval</td>
<td colspan="2">
<select>
<option>Yes</option>
<option>No</option>
</select>
</td>
</tr>
</table>

<!-- Depot + Transport -->
<div class="flex">
  <div>
    <div class="green-box">Depot</div>
    <input class="green-box">
  </div>
  <div>
    <div class="green-box">Transport</div>
    <input class="green-box">
  </div>
</div>

<!-- Product Table -->
<table id="productTable">
<tr>
<th>#</th>
<th>Product</th>
<th>Qty</th>
<th>Per Ctn Price</th>
<th>Total Price</th>
<th>Bonus</th>
</tr>

<tr>
<td>1</td>
<td><select class="productList"></select></td>
<td><input oninput="calculate()"></td>
<td><input oninput="calculate()"></td>
<td><input readonly></td>
<td><input></td>
</tr>
</table>

<button class="add-btn no-print" onclick="addRow()">+ Add Product</button>

<div class="total">
Total Ctn = <input id="totalCarton" readonly>
Total V = <input id="totalValue" readonly>
</div>

<div class="officer">
Officer Name <input>
Mobile <input>
Territory <input>
</div>

<div class="bottom no-print">

  <button class="btn pdf-btn" onclick="generatePDF()">📄 PDF</button>

  <button class="btn share-btn" onclick="sharePDF()">🔗 Share</button>

  <button class="btn save-btn" onclick="saveImage()">🖼️ Image</button>

  <button class="btn clear-btn" onclick="location.reload()">❌ Clear</button>

</div>

<script>

// product list
const products = ["Agritop 100gm","Agritop 50gm","Agrivit 200gm","Agrivit 100gm","Agrosave 20 Lit.","Agrosave 100ml","Arika (Blue) 500gm","Beater 400ml","Biozim 1 Lit.","Builder 500gm","Cyper 1 Lit.","Dare 1 Lit.","Divine 1 Lit.","Firotin 400ml","Marine 1Lit","Massive 500gm","Medisate 1 Lit.","Megazole 1 Lit.","Mosco Boron 500gm","Paramos 1 Lit.","Power Plus 1 Lit.","Radial 100ml","Real 100ml","Remote 100ml","Repel 100gm","Ronza 10gm","Supervit 1kg","Technovit 100gm","Tiefen 100ml","Winner 1 Lit."];

// dropdown fill
function fillDropdown(select){
  products.forEach(p=>{
    let opt=document.createElement("option");
    opt.textContent=p;
    select.appendChild(opt);
  });
}
fillDropdown(document.querySelector(".productList"));

// add row
function addRow(){
  let table=document.getElementById("productTable");
  let row=table.insertRow();
  let i=table.rows.length-1;

  row.innerHTML=`
  <td>${i}</td>
  <td><select class="productList"></select></td>
  <td><input oninput="calculate()"></td>
  <td><input oninput="calculate()"></td>
  <td><input readonly></td>
  <td><input></td>
  `;
  fillDropdown(row.querySelector("select"));
}

// calculate
function calculate(){
  let table=document.getElementById("productTable");
  let tc=0,tv=0;

  for(let i=1;i<table.rows.length;i++){
    let q=parseFloat(table.rows[i].cells[2].children[0].value)||0;
    let p=parseFloat(table.rows[i].cells[3].children[0].value)||0;

    let total=q*p;
    table.rows[i].cells[4].children[0].value=total.toFixed(2);

    tc+=q;
    tv+=total;
  }

  document.getElementById("totalCarton").value=tc;
  document.getElementById("totalValue").value=tv.toFixed(2);
}

// 🔥 PERFECT MULTI PAGE PDF
async function createPDFBlob(){
  const { jsPDF } = window.jspdf;
  const element = document.getElementById("formArea");

  // 🔥 HIDE BUTTONS
  document.querySelectorAll(".no-print").forEach(el => el.style.display = "none");

  const canvas = await html2canvas(element,{scale:2});
  const imgData = canvas.toDataURL("image/png");

  // 🔥 SHOW BACK BUTTONS
  document.querySelectorAll(".no-print").forEach(el => el.style.display = "");

  const pdf = new jsPDF('p','mm','a4');

  const imgWidth = 210;
  const pageHeight = 297;
  const imgHeight = canvas.height * imgWidth / canvas.width;

  let heightLeft = imgHeight;
  let position = 0;

  pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
  heightLeft -= pageHeight;

  while(heightLeft > 0){
    position -= pageHeight;
    pdf.addPage();
    pdf.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
    heightLeft -= pageHeight;
  }

  return pdf.output('blob');
}

// download pdf
async function generatePDF() {
  const { jsPDF } = window.jspdf;
  let element = document.getElementById("formArea");

  // 🔥 HIDE BUTTONS
  document.querySelectorAll(".no-print").forEach(el => el.style.display = "none");

  let canvas = await html2canvas(element, { scale: 2 });
  let imgData = canvas.toDataURL("image/png");

  // 🔥 SHOW BACK BUTTONS
  document.querySelectorAll(".no-print").forEach(el => el.style.display = "");

  let pdf = new jsPDF("p", "mm", "a4");

  let imgWidth = 210;
  let pageHeight = 297;
  let imgHeight = canvas.height * imgWidth / canvas.width;

  let heightLeft = imgHeight;
  let position = 0;

  pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
  heightLeft -= pageHeight;

  while (heightLeft > 0) {
    position -= pageHeight;
    pdf.addPage();
    pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
  }

  pdf.save("order.pdf");
}

// 🖼️ SAVE IMAGE FUNCTION (👉 এখানে বসবে)
async function saveImage() {
  let element = document.getElementById("formArea");

  // 🔥 hide buttons
  document.querySelectorAll(".no-print").forEach(el => el.style.display = "none");

  let canvas = await html2canvas(element, { scale: 2 });

  let imgData = canvas.toDataURL("image/png");

  // 🔥 show again
  document.querySelectorAll(".no-print").forEach(el => el.style.display = "");

  let a = document.createElement("a");
  a.href = imgData;
  a.download = "order.png";
  a.click();
}

// install
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredPrompt=e;
});
function installApp(){
  if(deferredPrompt) deferredPrompt.prompt();
  else alert("Install not available");
}

// 🔥 SERVICE WORKER REGISTER ADD
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
  
</script>

</body>
</html>
