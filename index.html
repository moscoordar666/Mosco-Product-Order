<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>

<link rel="icon" href="mosco-logo.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {font-family:Arial;margin:0;background:#ddd;}

#formArea{
max-width:420px;
margin:auto;
background:#eee;
padding:15px;
border-radius:30px;
border:6px solid black;
position:relative;
}

.install-btn{
position:absolute;
top:8px;
right:8px;
font-size:10px;
padding:4px 8px;
border:none;
border-radius:10px;
background:black;
color:white;
}

h2,h3{text-align:center;margin:5px;}

table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #444;padding:6px;font-size:13px;}
th{background:#00cfd1;}

input,select{
width:100%;
border:none;
background:transparent;
outline:none;
}

/* column size */
#productTable th:nth-child(2){width:130px;}
#productTable th:nth-child(3){width:60px;}
#productTable th:nth-child(6){width:80px;}
#productTable th:nth-child(7){width:50px;}

.add-btn{
background:#8bc34a;
padding:8px;
border:none;
border-radius:10px;
margin-top:10px;
}

.total{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.total input{
width:110px;
background:#8bc34a;
border-radius:8px;
}

.officer input{
border:1px solid #999;
border-radius:20px;
padding:6px;
margin-top:5px;
}

.bottom{
display:flex;
gap:8px;
margin-top:15px;
}

.bottom button{
flex:1;
padding:8px;
border:none;
border-radius:15px;
font-size:12px;
}

.pdf-btn{background:#4CAF50;color:#fff;}
.share-btn{background:#2196F3;color:#fff;}
.clear-btn{background:#f44336;color:#fff;}

.no-print{display:block;}
</style>
</head>

<body>

<div id="formArea">

<button class="install-btn no-print" onclick="installApp()">📲</button>

<div style="text-align:center;">
<img src="mosco-logo.png" style="width:80px;">
</div>

<h2>Mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<table>
<tr>
<td>Order Date</td>
<td><input id="orderDate"></td>
<td>Due Date</td>
<td><input id="dueDate"></td>
</tr>

<tr>
<td>Distributor</td>
<td><input id="name"></td>
<td>Season</td>
<td><input id="season"></td>
</tr>

<tr>
<td>Address</td>
<td><input id="address"></td>
<td>Type</td>
<td><input id="type"></td>
</tr>
</table>

<table id="productTable">
<tr>
<th>#</th>
<th>Product Name</th>
<th>Size</th>
<th>Qty</th>
<th>Per Ctn Price</th>
<th>Total Price</th>
<th>Bonus</th>
</tr>

<tr>
<td>1</td>
<td>
<select>
<option>Select Product</option>
<option>Agritop 100gm</option>
<option>Agritop 50gm</option>
<option>Agrivit 200gm</option>
<option>Agrivit 100gm</option>
<option>Agrivit 50gm</option>
<option>Agrosave 20 Lit.</option>
<option>Agrosave 100ml</option>
<option>Agrosave 50ml</option>
<option>Amonot 100ml (Aqua)</option>
<option>Arika (Blue) 500gm</option>
<option>Arika (Yellow) 500gm</option>
<option>Beater 400ml</option>
<option>Biozim 1 Lit.</option>
<option>Biozim 100ml</option>
<option>Cyper 1 Lit.</option>
<option>Cyper 100ml</option>
<option>Dare 1 Lit.</option>
<option>Dare 100ml</option>
<option>Divine 1 Lit.</option>
<option>Divine 100ml</option>
<option>Halotouch 1 Lit.</option>
<option>Halotouch 100ml</option>
<option>Marine 1 Lit.</option>
<option>Marine 100ml</option>
<option>Paramos 1 Lit.</option>
<option>Paramos 100ml</option>
<option>Power Plus 1 Lit.</option>
<option>Power Plus 100ml</option>
<option>Winner 1 Lit.</option>
</select>
</td>
<td><input></td>
<td><input oninput="calculate()"></td>
<td><input oninput="calculate()"></td>
<td><input readonly></td>
<td><input></td>
</tr>
</table>

<button class="add-btn no-print" onclick="addRow()">+ Add Product</button>

<div class="total">
Carton <input id="totalCarton">
Value <input id="totalValue">
</div>

<div class="officer">
Officer <input id="officer">
Mobile <input id="mobile">
Territory <input id="territory">
</div>

<div class="bottom no-print">
<button class="pdf-btn" onclick="generatePDF()">PDF</button>
<button class="share-btn" onclick="sharePDF()">Share</button>
<button class="clear-btn" onclick="clearForm()">Clear</button>
</div>

</div>

<script>

function addRow(){
let table=document.getElementById("productTable");
let row=table.insertRow();
let index=table.rows.length-1;

row.innerHTML=`
<td>${index}</td>
<td>${document.querySelector("select").outerHTML}</td>
<td><input></td>
<td><input oninput="calculate()"></td>
<td><input oninput="calculate()"></td>
<td><input readonly></td>
<td><input></td>`;
}

function calculate(){
let table=document.getElementById("productTable");
let totalCarton=0,totalValue=0;

for(let i=1;i<table.rows.length;i++){
let qty=table.rows[i].cells[3].children[0].value||0;
let price=table.rows[i].cells[4].children[0].value||0;
let total=qty*price;

table.rows[i].cells[5].children[0].value=total;
totalCarton+=Number(qty);
totalValue+=total;
}

document.getElementById("totalCarton").value=totalCarton;
document.getElementById("totalValue").value=totalValue;
}

async function makePDF(){
document.querySelectorAll(".no-print").forEach(e=>e.style.display="none");

const { jsPDF } = window.jspdf;
let canvas=await html2canvas(document.getElementById("formArea"),{scale:2});
let img=canvas.toDataURL("image/png");

let pdf=new jsPDF('p','mm','a4');
let h=canvas.height*210/canvas.width;
let y=0;

while(y<h){
pdf.addImage(img,'PNG',0,-y,210,h);
y+=297;
if(y<h) pdf.addPage();
}

document.querySelectorAll(".no-print").forEach(e=>e.style.display="block");
return pdf;
}

async function generatePDF(){
let pdf=await makePDF();
pdf.save("order.pdf");
}

async function sharePDF(){
let pdf=await makePDF();
let blob=pdf.output("blob");
let file=new File([blob],"order.pdf",{type:"application/pdf"});

if(navigator.share){
await navigator.share({files:[file],title:"Order"});
}else{
alert("Mobile Chrome use karo");
}
}

function clearForm(){
if(confirm("Clear all?")) location.reload();
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
e.preventDefault();
deferredPrompt=e;
});
function installApp(){
if(deferredPrompt) deferredPrompt.prompt();
}

</script>

</body>
</html>
