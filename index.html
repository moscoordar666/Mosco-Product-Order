<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #eee;
  padding: 10px;
}

.container {
  background: #fff;
  padding: 12px;
  border-radius: 12px;
}

h2, h3 {
  text-align: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

td, th {
  border: 1px solid #ccc;
  padding: 6px;
  font-size: 13px;
}

input {
  width: 100%;
  border: none;
  outline: none;
  font-size: 13px;
  background: transparent;
}

th {
  background: #f5f5f5;
}

.product {
  width: 140px;
}

.bonus {
  width: 60px;
}

.btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: black;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

.summary {
  margin-top: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container" id="app">

<h2>mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<table>
<tr>
<td><input placeholder="Order Date"></td>
<td><input placeholder="Due Date"></td>
</tr>

<tr>
<td colspan="2"><input placeholder="Distributor Name"></td>
</tr>

<tr>
<td colspan="2"><input placeholder="Address"></td>
</tr>

<tr>
<td><input placeholder="Season"></td>
<td><input placeholder="Order Type"></td>
</tr>

<tr>
<td><input placeholder="Slab (Y/N)"></td>
<td><input placeholder="S. Approval"></td>
</tr>
</table>

<table id="productTable">
<tr>
<th class="product">Product Name</th>
<th>P Size</th>
<th>Qty</th>
<th>Car Price</th>
<th>Total</th>
<th class="bonus">Bonus %</th>
</tr>
</table>

<button class="btn" onclick="addRow()">+ Add Product</button>

<div class="summary">
<b>Total carton:</b> <span id="totalQty">0</span><br>
<b>Total V:</b> <span id="totalValue">0</span>
</div>

<table>
<tr>
<td><input placeholder="Officer Name"></td>
</tr>
<tr>
<td><input placeholder="Mobile"></td>
</tr>
<tr>
<td><input placeholder="Territory"></td>
</tr>
</table>

<button class="btn" onclick="generatePDF()">Generate PDF</button>
<button class="btn" onclick="shareData()">Share</button>

</div>

<script>

function addRow() {
  let table = document.getElementById("productTable");
  let row = table.insertRow();

  row.innerHTML = `
    <td><input></td>
    <td><input></td>
    <td><input type="number" oninput="calculate()"></td>
    <td><input type="number" oninput="calculate()"></td>
    <td class="total">0</td>
    <td><input></td>
  `;
}

function calculate() {
  let rows = document.querySelectorAll("#productTable tr");
  let totalQty = 0;
  let totalValue = 0;

  rows.forEach((row, index) => {
    if (index === 0) return;

    let qty = row.cells[2].children[0].value || 0;
    let price = row.cells[3].children[0].value || 0;

    let total = qty * price;
    row.cells[4].innerText = total;

    totalQty += Number(qty);
    totalValue += total;
  });

  document.getElementById("totalQty").innerText = totalQty;
  document.getElementById("totalValue").innerText = totalValue;
}

async function generatePDF() {
  const { jsPDF } = window.jspdf;

  let canvas = await html2canvas(document.getElementById("app"));
  let img = canvas.toDataURL("image/png");

  let pdf = new jsPDF();
  pdf.addImage(img, 'PNG', 10, 10, 180, 0);
  pdf.save("order.pdf");
}

async function shareData() {
  let canvas = await html2canvas(document.getElementById("app"));
  canvas.toBlob(async function(blob) {

    let file = new File([blob], "order.png", { type: "image/png" });

    if (navigator.share) {
      await navigator.share({
        title: "Order",
        files: [file]
      });
    } else {
      alert("Sharing not supported");
    }

  });
}

</script>

</body>
</html>
