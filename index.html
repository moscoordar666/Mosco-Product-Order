<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="mosco-logo.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
  box-sizing:border-box;
}

body{
  font-family:Arial;
  margin:0;
  background:#dcdcdc;
  padding:10px;
}

#formArea{
  width:100%;
  max-width:430px;
  margin:auto;
  background:#efefef;
  padding:14px;
  border-radius:35px;
  border:5px solid #000;
  overflow:hidden;
}

/* HEAD */

h2,h3{
  text-align:center;
  margin:4px 0;
}

h2{
  font-size:18px;
}

h3{
  font-size:13px;
  font-weight:600;
}

/* TABLE */

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  table-layout:fixed;
}

td,th{
  border:1px solid #555;
  padding:3px;
  font-size:10px;
  overflow:hidden;
  word-break:break-word;
}

th{
  background:#16c7cf;
  font-weight:bold;
}

/* INPUT */

input,
select,
textarea{
  width:100%;
  border:none;
  outline:none;
  background:transparent;
  font-size:10px;
  padding:3px;
}

/* TOP TABLE */

.top-label{
  background:#16c7cf;
  font-weight:bold;
}

/* PRODUCT TABLE SIZE */

#productTable th:nth-child(1),
#productTable td:nth-child(1){
  width:8%;
  text-align:center;
}

#productTable th:nth-child(2),
#productTable td:nth-child(2){
  width:38%;
}

#productTable th:nth-child(3),
#productTable td:nth-child(3){
  width:14%;
  text-align:center;
}

#productTable th:nth-child(4),
#productTable td:nth-child(4){
  width:18%;
  text-align:center;
}

#productTable th:nth-child(5),
#productTable td:nth-child(5){
  width:18%;
  text-align:center;
}

#productTable th:nth-child(6),
#productTable td:nth-child(6){
  width:8%;
  text-align:center;
}

/* PRODUCT INPUT */

.product-input{
  font-size:9px;
}

/* BONUS */

.bonus-input{
  font-size:9px;
  text-align:center;
}

/* GREEN BOX */

.green-box{
  background:#8bc34a;
  border-radius:25px;
  padding:8px;
  margin-top:5px;
}

.flex{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.flex div{
  flex:1;
}

/* BUTTON */

.add-btn{
  background:#8bc34a;
  padding:6px 10px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  font-size:11px;
}

/* TOTAL */

.total{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-top:12px;
  font-size:11px;
}

.total-box{
  width:90px;
  background:#8bc34a;
  border-radius:20px;
  padding:6px;
  text-align:center;
}

/* COMMENT */

.comment-title{
  background:#16c7cf;
  padding:8px;
  border-radius:12px;
  margin-top:15px;
  font-size:12px;
  font-weight:bold;
}

.comment-box{
  width:100%;
  height:110px;
  background:#fff;
  border:2px solid #bbb;
  border-radius:20px;
  padding:10px;
  margin-top:8px;
  resize:none;
  font-size:10px;
}

/* OFFICER */

.officer{
  margin-top:15px;
}

.officer label{
  display:block;
  margin-top:8px;
  font-size:11px;
  font-weight:bold;
}

.officer input{
  background:#fff;
  border:2px solid #bbb;
  border-radius:25px;
  padding:8px;
  margin-top:4px;
}

/* BOTTOM BUTTON */

.bottom{
  display:flex;
  gap:8px;
  margin-top:20px;
}

.btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  color:#fff;
  font-size:11px;
  font-weight:bold;
}

.pdf-btn{
  background:#4CAF50;
}

.share-btn{
  background:#009688;
}

.save-btn{
  background:#ff9800;
}

.clear-btn{
  background:#f44336;
}

.install-btn{
  background:#2196f3;
  color:#fff;
  border:none;
  border-radius:10px;
  padding:4px 10px;
  font-size:10px;
}

.no-print{}

@media print{
  .no-print{
    display:none !important;
  }
}

</style>
</head>

<body>

<div id="formArea">

<div class="no-print" style="text-align:right;">
<button class="install-btn" onclick="installApp()">
Install
</button>
</div>

<div style="text-align:center;">
<img src="mosco-logo.png" style="width:75px;">
</div>

<h2>Mosco Marketing limited</h2>
<h3>Order Submission watermark Adomi</h3>

<!-- TOP TABLE -->

<table>

<tr>
<td class="top-label">Order Date</td>
<td><input></td>

<td class="top-label">Due Date</td>
<td><input></td>
</tr>

<tr>
<td>Distributor Name</td>
<td><input></td>

<td class="top-label">Season</td>
<td><input></td>
</tr>

<tr>
<td>Address</td>
<td><input></td>

<td class="top-label">Order Type</td>

<td>
<select>
<option>Cash</option>
<option>Credit</option>
</select>
</td>
</tr>

<tr>
<td colspan="2">Slab (Y/N)</td>

<td colspan="2">
<select>
<option>Yes</option>
<option>No</option>
</select>
</td>
</tr>

<tr>
<td colspan="2">S. Approval</td>

<td colspan="2">
<select>
<option>Yes</option>
<option>No</option>
</select>
</td>
</tr>

</table>

<!-- DEPOT -->

<div class="flex">

<div>
<div class="green-box">Depot</div>
<input class="green-box">
</div>

<div>
<div class="green-box">Transport</div>
<input class="green-box">
</div>

</div>

<!-- PRODUCT TABLE -->

<table id="productTable">

<tr>
<th>#</th>
<th>Product</th>
<th>Qty</th>
<th>Per Ctn</th>
<th>Total</th>
<th>Bns</th>
</tr>

<tr>

<td>1</td>

<td>
<input
type="text"
class="product-input"
placeholder="Product Name">
</td>

<td>
<input oninput="calculate()">
</td>

<td>
<input oninput="calculate()">
</td>

<td>
<input readonly>
</td>

<td>
<input maxlength="3" class="bonus-input">
</td>

</tr>

</table>

<button class="add-btn no-print" onclick="addRow()">
+ Add Product
</button>

<!-- TOTAL -->

<div class="total">

<div>
Total Ctn
</div>

<input
class="total-box"
id="totalCarton"
readonly>

<div>
Total V
</div>

<input
class="total-box"
id="totalValue"
readonly>

</div>

<!-- COMMENT -->

<div class="comment-title">
Comment
</div>

<textarea
class="comment-box"
maxlength="100"
placeholder="Write Comment Here...">
</textarea>

<!-- OFFICER -->

<div class="officer">

<label>Officer Name</label>
<input>

<label>Mobile</label>
<input>

<label>Territory</label>
<input>

</div>

<!-- BUTTON -->

<div class="bottom no-print">

<button class="btn pdf-btn" onclick="generatePDF()">
PDF
</button>

<button class="btn share-btn" onclick="shareContent()">
Share
</button>

<button class="btn save-btn" onclick="saveImage()">
Image
</button>

<button class="btn clear-btn" onclick="location.reload()">
Clear
</button>

</div>

</div>

<script>

// ADD ROW

function addRow(){

let table=document.getElementById("productTable");

let row=table.insertRow();

let i=table.rows.length-1;

row.innerHTML=`

<td>${i}</td>

<td>
<input
type="text"
class="product-input"
placeholder="Product Name">
</td>

<td>
<input oninput="calculate()">
</td>

<td>
<input oninput="calculate()">
</td>

<td>
<input readonly>
</td>

<td>
<input maxlength="3" class="bonus-input">
</td>

`;

}

// CALCULATE

function calculate(){

let table=document.getElementById("productTable");

let tc=0;
let tv=0;

for(let i=1;i<table.rows.length;i++){

let q=parseFloat(
table.rows[i].cells[2].children[0].value
)||0;

let p=parseFloat(
table.rows[i].cells[3].children[0].value
)||0;

let total=q*p;

table.rows[i].cells[4].children[0].value=
total.toFixed(2);

tc+=q;
tv+=total;

}

document.getElementById("totalCarton").value=tc;

document.getElementById("totalValue").value=
tv.toFixed(2);

}

// SHARE

async function shareContent(){

const element=document.getElementById("formArea");

document.querySelectorAll(".no-print")
.forEach(el=>el.style.display="none");

const canvas=await html2canvas(element,{
scale:2,
scrollY:0,
windowWidth:document.body.scrollWidth
});

document.querySelectorAll(".no-print")
.forEach(el=>el.style.display="");

canvas.toBlob(async(blob)=>{

const file=new File(
[blob],
"order-form.png",
{type:"image/png"}
);

if(
navigator.canShare &&
navigator.canShare({files:[file]})
){

await navigator.share({
title:"Order Form",
files:[file]
});

}else{

alert("Sharing not supported");

}

});

}

// PDF

async function generatePDF(){

const { jsPDF } = window.jspdf;

let element=document.getElementById("formArea");

document.querySelectorAll(".no-print")
.forEach(el=>el.style.display="none");

let canvas=await html2canvas(element,{
scale:2,
scrollY:0,
windowWidth:document.body.scrollWidth
});

let imgData=canvas.toDataURL("image/png");

document.querySelectorAll(".no-print")
.forEach(el=>el.style.display="");

let pdf=new jsPDF("p","mm","a4");

let imgWidth=190;

let imgHeight=
canvas.height * imgWidth / canvas.width;

pdf.addImage(
imgData,
"PNG",
10,
10,
imgWidth,
imgHeight
);

pdf.save("order.pdf");

}

// SAVE IMAGE

async function saveImage(){

let element=document.getElementById("formArea");

document.querySelectorAll(".no-print")
.forEach(el=>el.style.display="none");

let canvas=await html2canvas(element,{
scale:2,
scrollY:0,
windowWidth:document.body.scrollWidth
});

let imgData=canvas.toDataURL("image/png");

document.querySelectorAll(".no-print")
.forEach(el=>el.style.display="");

let a=document.createElement("a");

a.href=imgData;

a.download="order.png";

a.click();

}

// INSTALL

let deferredPrompt;

window.addEventListener(
'beforeinstallprompt',
(e)=>{
e.preventDefault();
deferredPrompt=e;
}
);

function installApp(){

if(deferredPrompt){

deferredPrompt.prompt();

}else{

alert("Install not available");

}

}

// SERVICE WORKER

if('serviceWorker' in navigator){

navigator.serviceWorker.register('sw.js');

}

</script>

</body>
</html>
