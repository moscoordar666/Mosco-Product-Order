<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 10px;
    background: #f5f5f5;
}

.container {
    max-width: 650px;
    margin: auto;
    background: #fff;
    padding: 15px;
    border-radius: 10px;
}

/* title */
h2, h3 {
    text-align: center;
    margin: 5px;
}

/* table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

td, th {
    border: 1px solid #ccc;
    padding: 6px;
    font-size: 13px;
}

/* input */
input {
    width: 100%;
    border: none;
    outline: none;
    font-size: 13px;
}

/* full width field */
.full {
    width: 100%;
}

/* button */
button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: black;
    color: white;
    border: none;
    border-radius: 6px;
}

/* MOBILE FIX (without breaking table) */
@media(max-width:600px){

    body {
        padding: 5px;
    }

    .container {
        padding: 10px;
    }

    td, th {
        font-size: 12px;
        padding: 5px;
    }

    h2 {
        font-size: 18px;
    }

    h3 {
        font-size: 14px;
    }

}
</style>
</head>

<body>

<div class="container">

<h2>mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<table>
<tr>
<td>Order Date</td>
<td><input></td>
<td>Due Date</td>
<td><input></td>
</tr>

<tr>
<td>Distributor Name</td>
<td colspan="3"><input class="full"></td>
</tr>

<tr>
<td>Address</td>
<td colspan="3"><input class="full"></td>
</tr>

<tr>
<td>Season</td>
<td><input></td>
<td>Order Type</td>
<td><input></td>
</tr>

<tr>
<td>Slab (Y/N)</td>
<td><input></td>
<td>S. Approval</td>
<td><input></td>
</tr>
</table>

<table>
<tr>
<th>Product Name</th>
<th>P Size</th>
<th>Qty</th>
<th>Car Price</th>
<th>Total</th>
<th>Bonus %</th>
</tr>

<tr>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
</tr>
</table>

<button>+ Add Product</button>

<p>Total carton: <input style="width:100px;"></p>
<p>Total V: <input style="width:150px;"></p>

<table>
<tr>
<td>Officer Name</td>
<td><input></td>
</tr>

<tr>
<td>Mobile</td>
<td><input></td>
</tr>

<tr>
<td>Territory</td>
<td><input></td>
</tr>
</table>

<button>Generate PDF</button>
<button>Share</button>

</div>

</body>
</html>
