<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>

<link rel="icon" href="mosco-logo.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #ddd;
}

#formArea {
  max-width: 420px;
  margin: auto;
  background: #eee;
  padding: 15px;
  border-radius: 30px;
  border: 6px solid black;
}

h2, h3 {
  text-align: center;
  margin: 5px 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

td, th {
  border: 1px solid #444;
  padding: 6px;
  font-size: 13px;
}

th {
  background: #00cfd1;
}

input {
  width: 100%;
  border: none;
  background: transparent;
  outline: none;
}

/* Column Fix */
#productTable th:nth-child(6),
#productTable td:nth-child(6) {
  width: 90px;
}

#productTable th:nth-child(7),
#productTable td:nth-child(7) {
  width: 50px;
}

.green-box {
  background: #8bc34a;
  border-radius: 20px;
  padding: 8px;
  margin-top: 5px;
}

.flex {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.flex div { flex: 1; }

.add-btn {
  background: #8bc34a;
  padding: 8px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

.total {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
}

.total input {
  width: 70px;
  background: #8bc34a;
  border-radius: 8px;
}

.officer {
  margin-top: 20px;
}

.officer input {
  border: 1px solid #999;
  border-radius: 20px;
  padding: 6px;
  margin-top: 5px;
}

.bottom {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.bottom button {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

.pdf-btn { background: #8bc34a; }
.share-btn { background: #cddc39; }
.clear-btn { background: #ff5252; color:white; }

.install-btn {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: #2196f3;
  color: white;
}
</style>
</head>

<body>

<div id="formArea">

<div style="text-align:center;">
  <img src="mosco-logo.png" style="width:80px;">
</div>

<h2>Mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<button id="installBtn" class="install-btn" style="display:none;">📲 Install App</button>

<table>
<tr>
<td style="background:#00cfd1;">Order Date</td>
<td><input id="orderDate"></td>
<td style="background:#00cfd1;">Due Date</td>
<td><input id="dueDate"></td>
</tr>

<tr>
<td>Distributor Name</td>
<td><input id="name"></td>
<td style="background:#00cfd1;">Season</td>
<td><input id="season"></td>
</tr>

<tr>
<td>Address</td>
<td><input id="address"></td>
<td style="background:#00cfd1;">Order Type</td>
<td><input id="type"></td>
</tr>

<tr>
<td colspan="2">Slab (Y/N)</td>
<td colspan="2"><input id="slab"></td>
</tr>

<tr>
<td colspan="2">S. Approval</td>
<td colspan="2"><input id="approval"></td>
</tr>
</table>

<div class="flex">
  <div>
    <div class="green-box">Mention Depot Name</div>
    <input class="green-box">
  </div>
  <div>
    <div class="green-box">Booking Transport Name</div>
    <input class="green-box">
  </div>
</div>

<table id="productTable">
<tr>
<th>#</th>
<th>Product Name</th>
<th>P Size</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
<th>Bonus</th>
</tr>

<tr>
<td>1</td>
<td><input></td>
<td><input></td>
<td><input oninput="calculate()"></td>
<td><input oninput="calculate()"></td>
<td><input readonly></td>
<td><input></td>
</tr>
</table>

<button class="add-btn" onclick="addRow()">+ Add Product</button>

<div class="total">
  Total carton = <input id="totalCarton" readonly>
  Total V = <input id="totalValue" readonly>
</div>

<div class="officer">
  Officer Name <input id="officer">
  Mobile <input id="mobile">
  Territory <input id="territory">
</div>

<div class="bottom">
  <button class="pdf-btn" onclick="generatePDF()">Generate PDF</button>
  <button class="share-btn" onclick="sharePDF()">Share</button>
</div>

<button class="clear-btn" onclick="clearForm()">❌ Clear All</button>

</div>

<script>

// ADD ROW
function addRow() {
  let table = document.getElementById("productTable");
  let row = table.insertRow();
  let index = table.rows.length - 1;

  row.innerHTML = `
  <td>${index}</td>
  <td><input></td>
  <td><input></td>
  <td><input oninput="calculate()"></td>
  <td><input oninput="calculate()"></td>
  <td><input readonly></td>
  <td><input></td>
  `;
}

// CALCULATE
function calculate() {
  let table = document.getElementById("productTable");
  let totalCarton = 0;
  let totalValue = 0;

  for (let i = 1; i < table.rows.length; i++) {
    let qty = table.rows[i].cells[3].children[0].value || 0;
    let price = table.rows[i].cells[4].children[0].value || 0;

    let total = qty * price;
    table.rows[i].cells[5].children[0].value = total;

    totalCarton += Number(qty);
    totalValue += total;
  }

  document.getElementById("totalCarton").value = totalCarton;
  document.getElementById("totalValue").value = totalValue;
}

// PDF FIX (UNLIMITED PAGE)
async function createPDFBlob() {
  const { jsPDF } = window.jspdf;

  let pdf = new jsPDF("p", "mm", "a4");

  let canvas = await html2canvas(document.getElementById("formArea"), { scale: 2 });

  let imgData = canvas.toDataURL("image/png");

  let imgWidth = 210;
  let pageHeight = 297;
  let imgHeight = canvas.height * imgWidth / canvas.width;

  let heightLeft = imgHeight;
  let position = 0;

  pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
  heightLeft -= pageHeight;

  while (heightLeft > 0) {
    position = heightLeft - imgHeight;
    pdf.addPage();
    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
  }

  return pdf.output("blob");
}

// DOWNLOAD
async function generatePDF() {
  let blob = await createPDFBlob();
  let url = URL.createObjectURL(blob);
  let a = document.createElement("a");
  a.href = url;
  a.download = "order.pdf";
  a.click();
}

// SHARE TO WHATSAPP
async function sharePDF() {
  let blob = await createPDFBlob();
  let file = new File([blob], "order.pdf", { type: "application/pdf" });

  if (navigator.share && navigator.canShare({ files: [file] })) {
    await navigator.share({
      files: [file],
      title: "Order PDF"
    });
  } else {
    alert("Use Chrome mobile for share");
  }
}

// CLEAR FORM
function clearForm() {
  if(confirm("সব ডাটা মুছতে চান?")) {
    location.reload();
  }
}

// INSTALL APP (PWA)
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'block';
});

document.getElementById('installBtn').addEventListener('click', () => {
  deferredPrompt.prompt();
});

</script>

</body>
</html>
