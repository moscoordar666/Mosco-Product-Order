<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Order App</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  padding: 20px;
}

h2, h3 {
  text-align: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

td, th {
  border: 1px solid black;
  padding: 5px;
}

input {
  width: 100%;
  border: none;
}

button {
  padding: 10px;
  margin: 10px 5px;
}

.center {
  text-align: center;
}
</style>

</head>

<body>

<h2>mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<table>
<tr>
<td>Order Date</td>
<td><input id="orderDate"></td>
<td>Due Date</td>
<td><input id="dueDate"></td>
</tr>

<tr>
<td>Distributor Name</td>
<td><input id="name"></td>
<td>Season</td>
<td><input id="season"></td>
</tr>

<tr>
<td>Address</td>
<td><input id="address"></td>
<td>Order Type</td>
<td><input id="type"></td>
</tr>

<tr>
<td colspan="2">Slab (Y/N)</td>
<td colspan="2"><input id="slab"></td>
</tr>

<tr>
<td colspan="2">S. Approval</td>
<td colspan="2"><input id="approval"></td>
</tr>
</table>

<br>

<table id="productTable">
<tr>
<th>Product Name</th>
<th>P Size</th>
<th>Qty</th>
<th>car price</th>
<th>Total Price</th>
<th>Bonus %</th>
</tr>

<tr>
<td><input></td>
<td><input></td>
<td><input oninput="calculate()"></td>
<td><input oninput="calculate()"></td>
<td><input readonly></td>
<td><input></td>
</tr>
</table>

<button onclick="addRow()">+ Add Product</button>

<br><br>

Total carton = <input id="totalCarton" readonly style="width:100px;">
Total V = <input id="totalValue" readonly style="width:150px;">

<br><br>

<table>
<tr>
<td>Officer Name</td>
<td><input id="officer"></td>
</tr>
<tr>
<td>Mobile</td>
<td><input id="mobile"></td>
</tr>
<tr>
<td>Territory</td>
<td><input id="territory"></td>
</tr>
</table>

<div class="center">
<button onclick="generatePDF()">📄 Generate PDF</button>
<button onclick="share()">📤 Share</button>
</div>

<script>

function addRow() {
  let table = document.getElementById("productTable");
  let row = table.insertRow();

  row.innerHTML = `
  <td><input></td>
  <td><input></td>
  <td><input oninput="calculate()"></td>
  <td><input oninput="calculate()"></td>
  <td><input readonly></td>
  <td><input></td>
  `;
}

function calculate() {
  let table = document.getElementById("productTable");
  let totalCarton = 0;
  let totalValue = 0;

  for (let i = 1; i < table.rows.length; i++) {
    let qty = table.rows[i].cells[2].children[0].value || 0;
    let price = table.rows[i].cells[3].children[0].value || 0;

    let total = qty * price;

    table.rows[i].cells[4].children[0].value = total;

    totalCarton += Number(qty);
    totalValue += total;
  }

  document.getElementById("totalCarton").value = totalCarton;
  document.getElementById("totalValue").value = totalValue;
}

function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("MOSCO Marketing Limited", 10, 10);
  doc.text("Order Submission Format", 10, 20);

  doc.text("Name: " + document.getElementById("name").value, 10, 30);
  doc.text("Address: " + document.getElementById("address").value, 10, 40);

  let y = 50;

  let table = document.getElementById("productTable");

  for (let i = 1; i < table.rows.length; i++) {
    let product = table.rows[i].cells[0].children[0].value;
    let qty = table.rows[i].cells[2].children[0].value;
    let total = table.rows[i].cells[4].children[0].value;

    doc.text(product + " Qty:" + qty + " Total:" + total, 10, y);
    y += 10;
  }

  doc.save("order.pdf");
}

function share() {
  let text = "Order from " + document.getElementById("name").value;
  window.open("https://wa.me/?text=" + encodeURIComponent(text));
}

</script>

</body>
</html>
