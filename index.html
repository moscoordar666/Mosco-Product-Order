<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>

<!-- PDF + Screenshot -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body {
  font-family: Arial;
  margin: 0;
  padding: 5px;
  background: #f4f6f9;
}

#formArea {
  background: #fff;
  padding: 10px;
  border-radius: 10px;
}

h2 {
  text-align: center;
  font-size: 16px;
  margin: 5px 0;
}

h3 {
  text-align: center;
  font-size: 13px;
  margin: 0;
  color: gray;
}

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 8px;
}

td, th {
  border: 1px solid #ccc;
  padding: 4px;
  font-size: 12px;
}

input {
  width: 100%;
  border: none;
  padding: 4px;
  font-size: 12px;
}

/* Product column size */
#productTable th:nth-child(1),
#productTable td:nth-child(1) { width: 35%; }

#productTable th:nth-child(2),
#productTable td:nth-child(2) { width: 15%; }

#productTable th:nth-child(3),
#productTable td:nth-child(3) { width: 12%; }

#productTable th:nth-child(4),
#productTable td:nth-child(4) { width: 12%; }

#productTable th:nth-child(5),
#productTable td:nth-child(5) { width: 14%; }

#productTable th:nth-child(6),
#productTable td:nth-child(6) { width: 12%; }

/* Buttons */
button {
  padding: 10px;
  margin: 8px 0;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: #1976d2;
  color: white;
  font-size: 14px;
}

/* Totals */
.total-box {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

.total-box input {
  width: 80px;
  border: 1px solid #ccc;
}

/* Mobile adjust */
@media(max-width:600px) {
  table {
    font-size: 11px;
  }
}

.center {
  text-align: center;
}

</style>
</head>

<body>

<div id="formArea">

<h2>mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<table>
<tr>
<td>Order Date</td>
<td><input id="orderDate"></td>
<td>Due Date</td>
<td><input id="dueDate"></td>
</tr>

<tr>
<td>Distributor Name</td>
<td><input id="name"></td>
<td>Season</td>
<td><input id="season"></td>
</tr>

<tr>
<td>Address</td>
<td><input id="address"></td>
<td>Order Type</td>
<td><input id="type"></td>
</tr>

<tr>
<td colspan="2">Slab (Y/N)</td>
<td colspan="2"><input id="slab"></td>
</tr>

<tr>
<td colspan="2">S. Approval</td>
<td colspan="2"><input id="approval"></td>
</tr>
</table>

<br>

<table id="productTable">
<tr>
<th>Product</th>
<th>Size</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
<th>Bonus</th>
</tr>

<tr>
<td><input></td>
<td><input></td>
<td><input oninput="calculate()"></td>
<td><input oninput="calculate()"></td>
<td><input readonly></td>
<td><input></td>
</tr>
</table>

<button onclick="addRow()">+ Add Product</button>

<div class="total-box">
  <div>Total Ctn: <input id="totalCarton" readonly></div>
  <div>Total V: <input id="totalValue" readonly></div>
</div>

<br>

<table>
<tr>
<td>Officer Name</td>
<td><input id="officer"></td>
</tr>
<tr>
<td>Mobile</td>
<td><input id="mobile"></td>
</tr>
<tr>
<td>Territory</td>
<td><input id="territory"></td>
</tr>
</table>

</div>

<div class="center">
<button onclick="generatePDF()">📄 Generate PDF</button>
<button onclick="share()">📤 Share</button>
</div>

<script>

// Add product row
function addRow() {
  let table = document.getElementById("productTable");
  let row = table.insertRow();

  row.innerHTML = `
  <td><input></td>
  <td><input></td>
  <td><input oninput="calculate()"></td>
  <td><input oninput="calculate()"></td>
  <td><input readonly></td>
  <td><input></td>
  `;
}

// Calculate totals
function calculate() {
  let table = document.getElementById("productTable");
  let totalCarton = 0;
  let totalValue = 0;

  for (let i = 1; i < table.rows.length; i++) {
    let qty = table.rows[i].cells[2].children[0].value || 0;
    let price = table.rows[i].cells[3].children[0].value || 0;

    let total = qty * price;

    table.rows[i].cells[4].children[0].value = total;

    totalCarton += Number(qty);
    totalValue += total;
  }

  document.getElementById("totalCarton").value = totalCarton;
  document.getElementById("totalValue").value = totalValue;
}

// Generate PDF
function generatePDF() {
  let form = document.getElementById("formArea");

  html2canvas(form).then(canvas => {
    let imgData = canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;
    let pdf = new jsPDF("p", "mm", "a4");

    let imgWidth = 210;
    let imgHeight = canvas.height * imgWidth / canvas.width;

    pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);

    pdf.save("order.pdf");
  });
}

// Share WhatsApp
function share() {
  let name = document.getElementById("name").value;
  let text = "Order from " + name;

  window.open("https://wa.me/?text=" + encodeURIComponent(text));
}

</script>

</body>
</html>
