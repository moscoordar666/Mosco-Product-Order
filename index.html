<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 10px;
    background: #f2f2f2;
}

.container {
    max-width: 480px;
    margin: auto;
    background: #fff;
    padding: 15px;
    border-radius: 12px;
}

h2, h3 {
    text-align: center;
    margin: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 13px;
}

td, th {
    border: 1px solid #ccc;
    padding: 6px;
}

input {
    width: 100%;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: black;
    color: white;
    border: none;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">

<h2>mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<table>
<tr>
<td>Order Date</td>
<td><input></td>
<td>Due Date</td>
<td><input></td>
</tr>

<tr>
<td>Distributor Name</td>
<td><input></td>
<td>Season</td>
<td><input></td>
</tr>

<tr>
<td>Address</td>
<td><input></td>
<td>Order Type</td>
<td><input></td>
</tr>
</table>

<table>
<tr>
<th>Product</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>

<tr>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
</tr>
</table>

<button>Add Product</button>

<p>Total carton: <input style="width:80px;"></p>
<p>Total V: <input style="width:120px;"></p>

<table>
<tr>
<td>Officer Name</td>
<td><input></td>
</tr>
<tr>
<td>Mobile</td>
<td><input></td>
</tr>
</table>

<button>Generate PDF</button>
<button>Share</button>

</div>

</body>
</html>
