<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order App</title>

<link rel="icon" href="mosco-logo.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#ddd; }

#formArea {
  max-width:420px;
  margin:auto;
  background:#eee;
  padding:15px;
  border-radius:30px;
  border:6px solid black;
}

h2,h3 { text-align:center; margin:5px 0; }

table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

td,th {
  border:1px solid #444;
  padding:6px;
  font-size:13px;
}

th { background:#00cfd1; }

input, select {
  width:100%;
  border:none;
  background:transparent;
  outline:none;
}

/* product column bigger */
#productTable th:nth-child(2),
#productTable td:nth-child(2){ width:220px; }

.green-box {
  background:#8bc34a;
  border-radius:20px;
  padding:8px;
  margin-top:5px;
}

.flex { display:flex; gap:10px; margin-top:10px; }
.flex div { flex:1; }

.add-btn {
  background:#8bc34a;
  padding:6px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  font-size:12px;
}

.total {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.total input {
  width:100px;
  background:#8bc34a;
  border-radius:8px;
  text-align:center;
}

.officer { margin-top:20px; }

.officer input {
  border:1px solid #999;
  border-radius:20px;
  padding:6px;
  margin-top:5px;
}

.bottom { display:flex; gap:10px; margin-top:20px; }

.btn {
  flex:1;
  padding:8px;
  border-radius:20px;
  border:none;
  font-size:13px;
  color:#fff;
}

.pdf-btn { background:#4CAF50; }
.share-btn { background:#009688; }

.clear-btn {
  background:#f44336;
  color:#fff;
  font-size:12px;
  padding:6px;
}

.install-btn {
  background:#2196f3;
  color:#fff;
  font-size:10px;
  padding:3px 8px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="formArea">

<div style="text-align:right;">
<button class="install-btn" onclick="installApp()">Install</button>
</div>

<div style="text-align:center;">
<img src="mosco-logo.png" style="width:80px;">
</div>

<h2>Mosco Marketing limited</h2>
<h3>Order Submission Format</h3>

<table>
<tr>
<td style="background:#00cfd1;">Order Date</td>
<td><input></td>
<td style="background:#00cfd1;">Due Date</td>
<td><input></td>
</tr>

<tr>
<td>Distributor Name</td>
<td><input></td>
<td style="background:#00cfd1;">Season</td>
<td><input></td>
</tr>

<tr>
<td>Address</td>
<td><input></td>
<td style="background:#00cfd1;">Order Type</td>
<td>
<select>
<option>Cash</option>
<option>Credit</option>
</select>
</td>
</tr>

<tr>
<td colspan="2">Slab (Y/N)</td>
<td colspan="2">
<select>
<option>Yes</option>
<option>No</option>
</select>
</td>
</tr>

<tr>
<td colspan="2">S. Approval</td>
<td colspan="2">
<select>
<option>Yes</option>
<option>No</option>
</select>
</td>
</tr>
</table>

<div class="flex">
<div>
<div class="green-box">Depot</div>
<input class="green-box">
</div>
<div>
<div class="green-box">Transport</div>
<input class="green-box">
</div>
</div>

<table id="productTable">
<tr>
<th>#</th>
<th>Product</th>
<th>Qty</th>
<th>Per Ctn Price</th>
<th>Total Price</th>
<th>Bonus</th>
</tr>

<tr>
<td>1</td>
<td><select class="productList"></select></td>
<td><input oninput="calculate()"></td>
<td><input oninput="calculate()"></td>
<td><input readonly></td>
<td><input></td>
</tr>
</table>

<button class="add-btn" onclick="addRow()">+ Add Product</button>

<div class="total">
Total Ctn = <input id="totalCarton" readonly>
Total V = <input id="totalValue" readonly>
</div>

<div class="officer">
Officer Name <input>
Mobile <input>
Territory <input>
</div>

<div class="bottom">
<button class="btn pdf-btn" onclick="generatePDF()">PDF</button>
<button class="btn share-btn" onclick="sharePDF()">Share</button>
</div>

<div style="text-align:center;">
<button class="clear-btn" onclick="location.reload()">Clear</button>
</div>

</div>

<script>

const products=["Agritop 100gm","Agritop 50gm","Agrivit 200gm","Agrivit 100gm","Agrosave 20 Lit.","Agrosave 100ml","Arika (Blue) 500gm","Beater 400ml","Biozim 1 Lit.","Builder 500gm","Cyper 1 Lit.","Dare 1 Lit.","Divine 1 Lit.","Firotin 400ml","Marine 1Lit","Massive 500gm","Medisate 1 Lit.","Megazole 1 Lit.","Mosco Boron 500gm","Paramos 1 Lit.","Power Plus 1 Lit.","Radial 100ml","Real 100ml","Remote 100ml","Repel 100gm","Ronza 10gm","Supervit 1kg","Technovit 100gm","Tiefen 100ml","Winner 1 Lit."];

function fillDropdown(select){
 products.forEach(p=>{
  let o=document.createElement("option");
  o.textContent=p;
  select.appendChild(o);
 });
}

fillDropdown(document.querySelector(".productList"));

function addRow(){
 let t=document.getElementById("productTable");
 let r=t.insertRow();
 let i=t.rows.length-1;

 r.innerHTML=`
 <td>${i}</td>
 <td><select class="productList"></select></td>
 <td><input oninput="calculate()"></td>
 <td><input oninput="calculate()"></td>
 <td><input readonly></td>
 <td><input></td>
 `;
 fillDropdown(r.querySelector("select"));
}

function calculate(){
 let t=document.getElementById("productTable");
 let tc=0,tv=0;

 for(let i=1;i<t.rows.length;i++){
  let q=parseFloat(t.rows[i].cells[2].children[0].value)||0;
  let p=parseFloat(t.rows[i].cells[3].children[0].value)||0;

  let total=q*p;
  t.rows[i].cells[4].children[0].value=total.toFixed(2);

  tc+=q;
  tv+=total;
 }

 document.getElementById("totalCarton").value=tc;
 document.getElementById("totalValue").value=tv.toFixed(2);
}

// 🔥 FIXED PDF (perfect A4)
async function createPDFBlob(){
 const { jsPDF } = window.jspdf;

 const canvas = await html2canvas(document.getElementById("formArea"), {scale:2});
 const img = canvas.toDataURL("image/jpeg",1.0);

 const pdf = new jsPDF('p','mm','a4');
 const pageWidth = 210;
 const pageHeight = 297;

 const imgWidth = pageWidth;
 const imgHeight = (canvas.height * imgWidth) / canvas.width;

 pdf.addImage(img,'JPEG',0,0,imgWidth,imgHeight);

 return pdf.output('blob');
}

async function generatePDF(){
 const blob = await createPDFBlob();
 const url = URL.createObjectURL(blob);

 const a = document.createElement("a");
 a.href = url;
 a.download = "order.pdf";
 a.click();
}

// 🔥 SHARE PDF (NOT LINK)
async function sharePDF(){
 const blob = await createPDFBlob();
 const file = new File([blob], "order.pdf", { type: "application/pdf" });

 if(navigator.share){
   navigator.share({
     files: [file],
     title: "Order PDF"
   });
 } else {
   alert("Sharing not supported");
 }
}

// install
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
 e.preventDefault();
 deferredPrompt=e;
});
function installApp(){
 if(deferredPrompt) deferredPrompt.prompt();
 else alert("Install not available");
}

</script>

</body>
</html>
